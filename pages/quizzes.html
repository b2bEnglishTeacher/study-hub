<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Hub — Bia Business English</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/navbar.css">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #6B6560;
    --accent: #C45D3E;
    --accent-light: #F4E8E3;
    --border: #E8E4DD;
    --success: #3A7D5C;
    --success-light: #E4F2EA;
    --error: #C45D3E;
    --error-light: #FCEAE5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .hero {
    padding: 10rem 2rem 4rem;
    max-width: 860px;
    margin: 0 auto;
    text-align: center;
    animation: fadeUp 0.8s ease-out;
  }

  .hero-mascot {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--surface);
    box-shadow: 0 8px 32px rgba(196,93,62,0.15), 0 0 0 1px var(--border);
    margin: 0 auto 2rem;
    display: block;
    animation: float 4s ease-in-out infinite, fadeUp 0.8s ease-out;
  }

  .hero .tag {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-light);
    padding: 0.35rem 1.2rem;
    border-radius: 100px;
    margin-bottom: 1.5rem;
  }

  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 1rem;
  }

  .hero h1 span { color: var(--accent); }

  .hero p {
    color: var(--text-muted);
    font-size: 1.05rem;
    max-width: 520px;
    margin: 0 auto;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 2rem;
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--accent);
  }

  .stat-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  /* MODE SELECTOR */
  .mode-selector {
    max-width: 740px;
    margin: 0 auto 2rem;
    padding: 0 2rem;
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .mode-btn {
    padding: 0.6rem 1.4rem;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.3s;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* FILTER */
  .filter-bar {
    max-width: 740px;
    margin: 0 auto 2rem;
    padding: 0 2rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .filter-chip {
    padding: 0.4rem 1rem;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.02em;
  }

  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

  /* QUIZ AREA */
  .quiz-hub {
    max-width: 740px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  .quiz-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .quiz-header h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
  }

  .quiz-progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .quiz-lesson-tag {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .quiz-body { padding: 1.5rem; }

  .quiz-question {
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }

  .quiz-options { display: flex; flex-direction: column; gap: 0.5rem; }

  .quiz-option {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.85rem 1rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
  }

  .quiz-option:hover { border-color: var(--accent-light); background: rgba(196,93,62,0.03); }

  .opt-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .quiz-option.correct { border-color: var(--success); background: var(--success-light); }
  .quiz-option.correct .opt-letter { background: var(--success); color: white; }
  .quiz-option.wrong { border-color: var(--error); background: var(--error-light); }
  .quiz-option.wrong .opt-letter { background: var(--error); color: white; }
  .quiz-option.disabled { opacity: 0.4; pointer-events: none; }

  .quiz-feedback {
    margin-top: 1rem;
    padding: 0.85rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    line-height: 1.6;
    display: none;
  }

  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct-fb { background: var(--success-light); color: var(--success); }
  .quiz-feedback.wrong-fb { background: var(--error-light); color: var(--error); }

  .quiz-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 0.75rem;
  }

  .btn {
    padding: 0.6rem 1.4rem;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-dark, #A94B2F); }
  .btn-secondary { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* SCORE DISPLAY */
  .score-display {
    text-align: center;
    padding: 3rem 2rem;
  }

  .score-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 3rem;
    font-weight: 600;
  }

  .score-label {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin: 0.5rem 0 1.5rem;
  }

  .score-details {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.5rem;
  }

  .score-detail {
    text-align: center;
  }

  .score-detail-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.2rem;
    font-weight: 500;
  }

  .score-detail-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }

  /* LESSON CARDS (browse mode) */
  .lesson-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .lesson-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .lesson-card:hover {
    border-color: var(--accent-light);
    box-shadow: 0 4px 16px rgba(196,93,62,0.08);
    transform: translateY(-2px);
  }

  .lesson-card-module {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }

  .lesson-card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 0.95rem;
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  .lesson-card-count {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .lesson-card-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--success);
    margin-top: 0.3rem;
  }

  .module-section {
    margin-bottom: 2rem;
  }

  .module-section-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  /* PROGRESS BAR */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  footer {
    text-align: center;
    padding: 3rem 2rem 2rem;
    font-size: 0.78rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    max-width: 740px;
    margin: 2rem auto 0;
  }

  .footer-logo {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 0.75rem;
    opacity: 0.7;
    transition: opacity 0.3s;
  }

  .footer-logo:hover { opacity: 1; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  @media (max-width: 640px) {
    .hero { padding: 8rem 1.5rem 3rem; }
    .hero h1 { font-size: 2rem; }
    .hero-mascot { width: 72px; height: 72px; }
    .quiz-hub { padding: 0 1.5rem 3rem; }
    .lesson-grid { grid-template-columns: 1fr; }
    .stats { gap: 1.5rem; }
    .stat-num { font-size: 1.3rem; }
    .mode-selector { padding: 0 1.5rem; }
    .filter-bar { padding: 0 1.5rem; }
  }
</style>
</head>
<body>
<script src="../assets/navbar.js" data-title="Quiz" data-subtitle="hub" data-sections=""></script>

<section class="hero">
  <img src="../assets/logo.png" alt="Mascot" class="hero-mascot"/>
  <div class="tag">Test Your Knowledge</div>
  <h1>Quiz <span>Hub</span></h1>
  <p>All 410 questions from every lesson. Choose a module, pick a quiz, or challenge yourself with a random mix.</p>
  <div class="stats">
    <div class="stat"><div class="stat-num">410</div><div class="stat-label">Questions</div></div>
    <div class="stat"><div class="stat-num">41</div><div class="stat-label">Lessons</div></div>
    <div class="stat"><div class="stat-num">10</div><div class="stat-label">Modules</div></div>
  </div>
</section>

<div class="mode-selector">
  <button class="mode-btn active" onclick="setMode('browse')">Browse Lessons</button>
  <button class="mode-btn" onclick="setMode('random10')">Random 10</button>
  <button class="mode-btn" onclick="setMode('random25')">Random 25</button>
  <button class="mode-btn" onclick="setMode('all')">All Questions</button>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" onclick="filterModule('all')">All Modules</button>
  <button class="filter-chip" onclick="filterModule('01')">01 Interview</button>
  <button class="filter-chip" onclick="filterModule('02')">02 Communication</button>

  <button class="filter-chip" onclick="filterModule('04')">04 Soft Skills</button>
  <button class="filter-chip" onclick="filterModule('05')">05 Writing</button>
  <button class="filter-chip" onclick="filterModule('06')">06 Sales</button>
  <button class="filter-chip" onclick="filterModule('07')">07 Finance</button>
  <button class="filter-chip" onclick="filterModule('08')">08 Tech</button>
  <button class="filter-chip" onclick="filterModule('09')">09 Leadership</button>
  <button class="filter-chip" onclick="filterModule('10')">10 Office</button>
</div>

<div class="quiz-hub" id="quizHub"></div>

<footer>
  <img src="../assets/logo.png" alt="Bia" class="footer-logo"/>
  <p>Bia Business English &mdash; Your complete quiz reference</p>
</footer>

<script>
var allQuizzes = [
  {lesson:'Master the STAR Method',file:'star-method.html',module:'01',moduleName:'Interview & Career Skills',questions:[
    {q:'What does the \\',opts:['Strategy','Situation','Solution','Summary'],c:1,fb:{y:'Correct! The \\',n:'Not quite. \\'}},
    {q:'Which part of the STAR method should take up the most time in your answer?',opts:['Situation','Task','Action','Result'],c:2,fb:{y:'That',n:'The Action section should take up the most time — it'}},
    {q:'Which of these is a behavioural interview question?',opts:['What is your greatest strength?','Tell me about a time you solved a problem at work.','Where do you see yourself in five years?','What is your expected salary?'],c:1,fb:{y:'Exactly! Behavioural questions ask about specific past experiences using phrases like \\',n:'The correct answer is \\'}},
    {q:'In the Task section, you should explain:',opts:['What the company does','Your specific responsibility or goal','The result you achieved','How many people were on the team'],c:1,fb:{y:'Well done! The Task describes your specific responsibility or the goal you needed to achieve.',n:'The Task section should describe your specific responsibility or the goal you were working towards — not the team or the result.'}},
    {q:'Why is it important to use \\',opts:['To sound more confident','Because teamwork is not valued','To highlight your individual contribution','To make the story shorter'],c:2,fb:{y:'Exactly! Using \\',n:'The reason is to highlight your individual contribution. Interviewers want to know what YOU specifically did.'}},
    {q:'Which of these is the best example of a Result?',opts:['The project went well and everyone was happy.','We launched on time and increased client retention by 15%.','I worked really hard on it.','My manager said good job.'],c:1,fb:{y:'That',n:'The best Result is \\'}},
    {q:'How many STAR stories should you ideally prepare before an interview?',opts:['1','3–5','10+','None — improvise everything'],c:1,fb:{y:'Right! Having 3–5 prepared stories covering different competencies gives you flexibility during the interview.',n:'The recommendation is 3–5 stories. This gives you enough variety to handle different types of behavioural questions.'}},
    {q:'Which phrase is most likely to start a STAR-method question?',opts:['What would you do if…','Describe a situation where…','How would you define…','What is your opinion on…'],c:1,fb:{y:'Correct! \\',n:'\\'}},
    {q:'What percentage of your answer should the Situation and Task sections represent?',opts:['About 50%','About 80%','About 20%','About 10%'],c:2,fb:{y:'That',n:'The Situation and Task should be about 20% of your answer. The majority should focus on your Action and the Result.'}},
    {q:'What makes a STAR answer \\',opts:['Using technical jargon','Including specific numbers, percentages, or measurable outcomes','Making the answer very long','Mentioning your job title'],c:1,fb:{y:'Exactly! Quantifiable means using specific numbers, percentages, or measurable outcomes to prove impact.',n:'\\'}},
  ]},
  {lesson:'The Elevator Pitch',file:'elevator-pitch.html',module:'01',moduleName:'Interview & Career Skills',questions:[
    {q:'How long should an elevator pitch typically last?',opts:['5 minutes','30–60 seconds','2–3 minutes','10 seconds'],c:1,fb:{y:'That',n:'An elevator pitch should last 30–60 seconds — enough time for a short elevator ride.'}},
    {q:'What is the main purpose of the ',opts:['To list your qualifications','To grab the listener',', ',', '],c:1,fb:{y:'Exactly! The hook is designed to capture interest immediately.',n:'The hook is meant to grab the listener'}},
    {q:'What does ',opts:['Your salary expectations','What makes you or your offer uniquely valuable','A list of your skills','Your company'],c:1,fb:{y:'Correct! Your value proposition communicates what makes you stand out.',n:'A value proposition describes what makes you or your offer uniquely valuable to others.'}},
    {q:'Which of these is the best way to end an elevator pitch?',opts:['Just stop talking','Say ','s all',', ',', '],c:2,fb:{y:'Well done! Ending with a question or invitation turns your pitch into a conversation.',n:'The best ending is a call to action — a question or suggestion for a next step.'}},
    {q:'Why should you avoid jargon in your elevator pitch?',opts:['It makes you sound too smart','Not everyone will understand technical language','Jargon is always incorrect','It takes too long to say'],c:1,fb:{y:'Right! Your pitch should be understandable to anyone, not just people in your field.',n:'You should avoid jargon because not everyone will understand industry-specific language.'}},
    {q:'How many versions of your pitch should you prepare?',opts:['Just one','2–3 versions for different contexts','A new one every time','None — always improvise'],c:1,fb:{y:'Correct! Having 2–3 versions (15s, 30s, 60s) gives you flexibility.',n:'You should prepare 2–3 versions to adapt to different situations and time constraints.'}},
    {q:'What does ',opts:['To make clothes','To speak louder','To adapt your message for a specific audience','To memorise your speech'],c:2,fb:{y:'Exactly! Tailoring means adapting your pitch to suit the person or situation.',n:'\'To tailor'}},
    {q:'Which of these is a good example of a hook?',opts:['I have a degree in marketing.','Did you know that 80% of startups fail in their first year?','I',', ','m 28 years old.'],c:1,fb:{y:'That',n:'A compelling question or surprising fact makes the best hook — it grabs attention instantly.'}},
    {q:'What should the ',opts:['Your education history','The impact and results you deliver','Your hobbies','Your salary requirements'],c:1,fb:{y:'Right! Focus on the impact you create, not just credentials.',n:'The value section should focus on the results and impact you deliver — not just your background.'}},
    {q:'What does ',opts:['A type of report','A financial document','A close, harmonious professional relationship','A formal presentation'],c:2,fb:{y:'Correct! Building rapport means creating a genuine connection with someone.',n:'Rapport is a close, harmonious relationship — building it is key to effective networking.'}},
  ]},
  {lesson:'Small Talk in Business',file:'small-talk.html',module:'01',moduleName:'Interview & Career Skills',questions:[
    {q:'What is the main purpose of small talk in business?',opts:['To waste time before meetings','To build rapport and trust','To show off your vocabulary','To avoid doing work'],c:1,fb:{y:'Exactly! Small talk builds trust and creates comfortable professional relationships.',n:'Small talk'}},
    {q:'Which of these is a safe topic for business small talk?',opts:['Salary and bonuses','Political opinions','Weekend plans','Religious beliefs'],c:2,fb:{y:'Right! Weekend plans are a neutral, positive topic perfect for small talk.',n:'Safe topics include things like weekend plans, travel, the event, and weather — avoid politics, religion, and salary.'}},
    {q:'What is an ',opts:['A question with no answer','A question that can',', ',', '],c:1,fb:{y:'Correct! Open-ended questions encourage longer, more engaging responses.',n:'An open-ended question requires more than a yes/no answer — it encourages discussion.'}},
    {q:'What does ',opts:['To literally break something frozen','To end a meeting','To start a conversation in a new situation','To disagree with someone'],c:2,fb:{y:'That',n:'\'To break the ice'}},
    {q:'Which is the best follow-up to: ',opts:['OK.','How much is your rent?','Oh really? What brought you here? How are you finding it so far?','I don'],c:2,fb:{y:'Great choice! This shows genuine interest and invites them to share more.',n:'A good follow-up shows interest and is open-ended, like asking what brought them there.'}},
    {q:'How should you ideally balance talking vs. listening?',opts:['Talk 80%, listen 20%','Talk 50%, listen 50%','Listen more — about 60% listening, 40% talking','Only listen, never talk'],c:2,fb:{y:'Right! Leaning slightly towards listening shows genuine interest.',n:'Aim for about 60% listening and 40% talking — it shows you value the other person.'}},
    {q:'What does ',opts:['A shared office space','Shared interests or experiences','A type of coffee','A meeting room'],c:1,fb:{y:'Exactly! Finding common ground helps build connection quickly.',n:'Common ground refers to shared interests, experiences, or opinions between people.'}},
    {q:'Which is the best way to exit a small talk conversation?',opts:['Just walk away','Look at your phone until they leave','Thank them and suggest connecting later','Say '],c:2,fb:{y:'Well done! A graceful exit thanks the person and leaves the door open.',n:'The best exit is polite — thank them and suggest connecting again later.'}},
    {q:'What does ',opts:['To play baseball','To make brief contact with someone','To start a new project','To end a relationship'],c:1,fb:{y:'Correct! ',n:'\'To touch base'}},
    {q:'Which of these should you avoid during small talk?',opts:['Asking about their weekend','Commenting on the event','Checking your phone while they speak','Asking about their travel'],c:2,fb:{y:'Right! Looking at your phone is disrespectful and kills conversation.',n:'Avoid checking your phone while someone is talking — it signals disinterest.'}},
  ]},
  {lesson:'Negotiation Language',file:'negotiation-language.html',module:'01',moduleName:'Interview & Career Skills',questions:[
    {q:'What does BATNA stand for?',opts:['Best Action Towards New Agreements','Best Alternative to a Negotiated Agreement','Business Agreement for Trade and Negotiation','Basic Approach to Negotiation Analysis'],c:1,fb:{y:'Correct! BATNA is your best alternative if negotiations fail — it',n:'BATNA stands for Best Alternative to a Negotiated Agreement — your plan B.'}},
    {q:'Which phrase is most diplomatic for proposing a salary?',opts:['I want €50,000.','I demand at least €50,000.','What if we considered a figure around €50,000?','Give me €50,000 or I'],c:2,fb:{y:'Well done! ',n:'The most diplomatic option uses tentative language: '}},
    {q:'What is a ',opts:['A type of contract','Something you give up to reach agreement','A confession of guilt','A new demand'],c:1,fb:{y:'Right! A concession is something you give up in exchange for something else.',n:'A concession is something you give up or accept to help reach an agreement.'}},

  {lesson:'Giving & Receiving Feedback',file:'giving-receiving-feedback.html',module:'01',moduleName:'Interview & Career Skills',questions:[
    {q:'What does SBI stand for in the SBI feedback model?',opts:['Simple, Brief, Important','Situation, Behaviour, Impact','Start, Build, Improve','Specific, Balanced, Insightful'],c:1,fb:{y:'Correct! SBI stands for Situation, Behaviour, Impact — a clear framework for structuring feedback.',n:'SBI stands for Situation, Behaviour, Impact — describe what happened, what was done, and the effect.'}},
    {q:'Why is ',opts:['It',',','t specify what was done well or why it mattered','It',',','s grammatically incorrect'],c:1,fb:{y:'Right! Effective praise names the specific behaviour and its impact.',n:'\'Good job'}},
    {q:'What should you focus on when giving constructive feedback?',opts:['The person',',',',',','],c:2,fb:{y:'Exactly! Focus on observable behaviour, not personality or character.',n:'Always focus on specific, observable behaviour — never personality or character traits.'}},
    {q:'What is the first thing you should do when receiving feedback?',opts:['Defend yourself immediately','Explain why the feedback is wrong','Listen without interrupting','Change the subject'],c:2,fb:{y:'That',n:'The first step is always to listen without interrupting — even if you disagree.'}},

  ]},
  {lesson:'Email Etiquette',file:'email-etiquette.html',module:'02',moduleName:'Business Communication',questions:[

  {lesson:'Meetings & Conference Calls',file:'meetings-calls.html',module:'02',moduleName:'Business Communication',questions:[
    {q:'What should you do first when opening a meeting?',opts:['Jump straight into the first topic','Welcome everyone and state the agenda','Ask who',','],c:1,fb:{y:'Right! A good opening welcomes participants and sets clear expectations.',n:'Always start by welcoming participants and outlining the agenda.'}},
    {q:'What does ',opts:['To cancel the meeting','To set a topic aside for later','To leave the room','To take a break'],c:1,fb:{y:'Correct! Parking a topic means saving it for a later discussion.',n:'\'To park something'}},
    {q:'What are ',opts:['The duration of a meeting','A written record of what was discussed and decided','A countdown timer','The meeting invitation'],c:1,fb:{y:'That',n:'Meeting minutes are a written summary of what was discussed and decided.'}},
    {q:'Which phrase politely redirects an off-topic discussion?',opts:['Stop talking about that.','That',',','s a great point — could we park that and come back to it?','Nobody cares about that.'],c:2,fb:{y:'Well done! This acknowledges the contribution while steering back to the agenda.',n:'A diplomatic redirect acknowledges the point before suggesting to return to the topic later.'}},
    {q:'What does ',opts:['Always On Budget','Any Other Business','Attendance Of Board','Agenda Of Business'],c:1,fb:{y:'Correct! AOB is the section at the end for topics not on the original agenda.',n:'AOB stands for Any Other Business — additional items raised at the end.'}},
    {q:'What should you always do on a video call when not speaking?',opts:['Turn off your camera','Mute your microphone','Leave the meeting','Start typing'],c:1,fb:{y:'Right! Muting prevents background noise from disrupting the call.',n:'Always mute yourself when not speaking to avoid background noise.'}},
    {q:'What is an ',opts:['A type of meeting','A task assigned to someone with a deadline','An agenda topic','A meeting room'],c:1,fb:{y:'Exactly! Action items are specific tasks with owners and deadlines.',n:'An action item is a task assigned to someone during a meeting, with a clear deadline.'}},
    {q:'What does ',opts:['To walk in circles','To return to a previously discussed topic','To cancel a decision','To invite more people'],c:1,fb:{y:'Correct! Circling back means revisiting a topic you discussed earlier.',n:'\'To circle back'}},
    {q:'How should you end a meeting effectively?',opts:['Just say ',' and hang up','Summarise decisions, assign action items, confirm next meeting','Keep talking until everyone leaves','Send an email instead of closing verbally'],c:1,fb:{y:'That',n:'End by summarising key decisions, assigning action items, and confirming the next meeting.'}},
    {q:'What does ',opts:['To sit in a chair during the meeting','To take notes','To lead and facilitate the meeting','To attend but not participate'],c:2,fb:{y:'Right! The chair leads the discussion, manages time, and ensures the agenda is followed.',n:'\'To chair a meeting'}},
  ]},
  {lesson:'Presentations & Public Speaking',file:'presentations.html',module:'02',moduleName:'Business Communication',questions:[
    {q:'What is the ',opts:['Present for exactly 3 minutes','Always use 3 slides','Organise content into 3 main points for memorability','Invite 3 people to your presentation'],c:2,fb:{y:'Right! People naturally remember information better in groups of three.',n:'The Rule of Three means organising your content into 3 main points — it aids memory and clarity.'}},

    {q:'What does ',opts:['To make something shorter','To explain in more detail','To add slides','To change the topic'],c:1,fb:{y:'Correct! ',n:'\'To elaborate'}},

    {q:'What is a ',opts:['A balcony in a conference room','The set of slides used in a presentation','A card game','A type of projector'],c:1,fb:{y:'That',n:'A '}},
    {q:'What is a ',opts:['Asking the audience to clap','Telling the audience what you want them to do next','Calling someone on the phone','Ending with a joke'],c:1,fb:{y:'Exactly! A call to action gives the audience a clear next step.',n:'A call to action tells the audience what you want them to do after the presentation.'}},

  {lesson:'Polite Disagreement',file:'polite-disagreement.html',module:'02',moduleName:'Business Communication',questions:[

    {q:'Which is better: challenging the person or the idea?',opts:['Always challenge the person directly','Challenge the idea, not the person','Neither — just agree','It doesn'],c:1,fb:{y:'Exactly! ',n:'Always challenge ideas, not people — it keeps the discussion constructive.'}},

  ]},

  {lesson:'SWOT Analysis Vocabulary',file:'swot-analysis.html',module:'03',moduleName:'Professional Development',questions:[

    {q:'What format should user stories follow?',opts:['Title + Description + Date'],c:1,fb:{y:'Correct! This format keeps stories user-focused and outcome-oriented.',n:'User stories follow: '}},

    {q:'What is the ',opts:['When the manager says it',',',',',','],c:1,fb:{y:'Correct! Having a clear DoD ensures consistent quality across all completed work.',n:'The Definition of Done is a checklist of criteria that must be met before a task is considered complete.'}},

  {lesson:'Conflict Resolution',file:'conflict-resolution.html',module:'04',moduleName:'Soft Skills & Workplace',questions:[
    {q:'What is the first step in resolving a workplace conflict?',opts:['Complain to HR immediately','Identify the actual issue and separate person from problem','Send an angry email','Ignore it and hope it goes away'],c:1,fb:{y:'Right! Clarifying the real issue calmly is always the first step.',n:'Start by identifying the actual problem — separate the person from the issue.'}},

    {q:'What does ',opts:['To open a window','To resolve tension through honest conversation','To clean the office','To change the subject'],c:1,fb:{y:'Correct! Clearing the air means having an honest talk to resolve underlying tension.',n:'\'To clear the air'}},
    {q:'Which phrase should you avoid during conflict?',opts:['I understand your concern','From my perspective…','You always do this!','I feel frustrated when…'],c:2,fb:{y:'Right! ',n:'Avoid '}},

  {lesson:'SaaS & Cloud Vocabulary',file:'saas-cloud.html',module:'08',moduleName:'Technology & Digital',questions:[

var letters = ['A','B','C','D'];
var currentMode = 'browse';
var currentModule = 'all';
var activeQuestions = [];
var currentQ = 0;
var score = 0;
var answered = false;
var lessonScores = {};

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');

  if (mode === 'browse') {
    document.getElementById('filterBar').style.display = 'flex';
    renderBrowse();
  } else {
    document.getElementById('filterBar').style.display = 'none';
    startQuiz(mode);
  }
}

function filterModule(mod) {
  currentModule = mod;
  document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
  event.target.classList.add('active');
  renderBrowse();
}

function renderBrowse() {
  var hub = document.getElementById('quizHub');
  var html = '';

  var grouped = {};
  for (var i = 0; i < allQuizzes.length; i++) {
    var lesson = allQuizzes[i];
    if (currentModule !== 'all' && lesson.module !== currentModule) continue;
    var key = lesson.module + ' — ' + lesson.moduleName;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(lesson);
  }

  for (var modKey in grouped) {
    html += '<div class="module-section"><div class="module-section-header">' + modKey + '</div><div class="lesson-grid">';
    var lessons = grouped[modKey];
    for (var j = 0; j < lessons.length; j++) {
      var l = lessons[j];
      var scoreHtml = lessonScores[l.file] ? '<div class="lesson-card-score">' + lessonScores[l.file] + '</div>' : '';
      html += '<div class="lesson-card" onclick="startLessonQuiz(\'' + l.file + '\')">' +
        '<div class="lesson-card-module">Module ' + l.module + '</div>' +
        '<div class="lesson-card-title">' + l.lesson + '</div>' +
        '<div class="lesson-card-count">' + l.questions.length + ' questions</div>' +
        scoreHtml +
        '</div>';
    }
    html += '</div></div>';
  }

  hub.innerHTML = html;
}

function startLessonQuiz(file) {
  for (var i = 0; i < allQuizzes.length; i++) {
    if (allQuizzes[i].file === file) {
      activeQuestions = allQuizzes[i].questions.map(function(q) {
        return {q: q.q, opts: q.opts, c: q.c, fb: q.fb, lesson: allQuizzes[i].lesson};
      });
      currentQ = 0;
      score = 0;
      renderQuestion();
      return;
    }
  }
}

function startQuiz(mode) {
  var pool = [];
  for (var i = 0; i < allQuizzes.length; i++) {
    var lesson = allQuizzes[i];
    for (var j = 0; j < lesson.questions.length; j++) {
      pool.push({q: lesson.questions[j].q, opts: lesson.questions[j].opts, c: lesson.questions[j].c, fb: lesson.questions[j].fb, lesson: lesson.lesson});
    }
  }

  // Shuffle
  for (var k = pool.length - 1; k > 0; k--) {
    var r = Math.floor(Math.random() * (k + 1));
    var tmp = pool[k]; pool[k] = pool[r]; pool[r] = tmp;
  }

  var count = mode === 'random10' ? 10 : mode === 'random25' ? 25 : pool.length;
  activeQuestions = pool.slice(0, count);
  currentQ = 0;
  score = 0;
  renderQuestion();
}

function renderQuestion() {
  var hub = document.getElementById('quizHub');

  if (currentQ >= activeQuestions.length) {
    var pct = Math.round((score / activeQuestions.length) * 100);
    var msg = pct >= 80 ? 'Excellent work!' : pct >= 60 ? 'Good effort — review and try again!' : 'Keep studying — you\'ll get there!';
    var color = pct >= 60 ? 'var(--success)' : 'var(--accent)';
    hub.innerHTML =
      '<div class="quiz-container"><div class="score-display">' +
      '<div class="score-num" style="color:' + color + '">' + score + '/' + activeQuestions.length + '</div>' +
      '<div class="score-label">' + pct + '% — ' + msg + '</div>' +
      '<div class="score-details">' +
      '<div class="score-detail"><div class="score-detail-num" style="color:var(--success)">' + score + '</div><div class="score-detail-label">Correct</div></div>' +
      '<div class="score-detail"><div class="score-detail-num" style="color:var(--error)">' + (activeQuestions.length - score) + '</div><div class="score-detail-label">Wrong</div></div>' +
      '</div>' +
      '<button class="btn btn-primary" onclick="setMode(\'browse\')">Back to Lessons</button> ' +
      '<button class="btn btn-secondary" onclick="startQuiz(\'random10\')">Random 10</button>' +
      '</div></div>';
    return;
  }

  var q = activeQuestions[currentQ];
  var pctDone = Math.round(((currentQ) / activeQuestions.length) * 100);
  hub.innerHTML =
    '<div class="quiz-container">' +
    '<div class="quiz-header">' +
    '<div><div class="quiz-lesson-tag">' + q.lesson + '</div><h3>Question ' + (currentQ + 1) + '</h3></div>' +
    '<div class="quiz-progress">' + (currentQ + 1) + ' / ' + activeQuestions.length + '</div>' +
    '</div>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:' + pctDone + '%"></div></div>' +
    '<div class="quiz-body">' +
    '<div class="quiz-question">' + q.q + '</div>' +
    '<div class="quiz-options">' +
    q.opts.map(function(opt, i) {
      return '<div class="quiz-option" onclick="selectAnswer(' + i + ')" id="opt-' + i + '">' +
        '<div class="opt-letter">' + letters[i] + '</div><div>' + opt + '</div></div>';
    }).join('') +
    '</div>' +
    '<div class="quiz-feedback" id="feedback"></div>' +
    '</div>' +
    '<div class="quiz-footer">' +
    '<button class="btn btn-secondary" onclick="setMode(\'browse\')">Exit</button>' +
    '<button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next &rarr;</button>' +
    '</div></div>';
  answered = false;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  var q = activeQuestions[currentQ];
  var isCorrect = idx === q.c;
  if (isCorrect) score++;

  for (var i = 0; i < q.opts.length; i++) {
    var el = document.getElementById('opt-' + i);
    if (i === q.c) el.classList.add('correct');
    else if (i === idx && !isCorrect) el.classList.add('wrong');
    if (i !== idx && i !== q.c) el.classList.add('disabled');
  }

  var fb = document.getElementById('feedback');
  fb.textContent = isCorrect ? q.fb.y : q.fb.n;
  fb.className = 'quiz-feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  document.getElementById('nextBtn').style.display = 'inline-flex';
}

function nextQuestion() {
  currentQ++;
  renderQuestion();
  window.scrollTo({top: document.getElementById('quizHub').offsetTop - 80, behavior: 'smooth'});
}

// Init
renderBrowse();
</script>
