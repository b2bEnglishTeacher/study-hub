<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="../assets/logo.png">
<title>Login — Bia Business English</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F7F5F0;--surface:#FFFFFF;--text:#1A1A1A;--text-muted:#6B6560;--accent:#6366F1;--accent-light:#EEF2FF;--accent-dark:#4F46E5;--border:#E8E4DD}
  *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;font-size:16px;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3rem 2.5rem;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.04);animation:fadeUp .6s ease-out}
  .not-logged{display:none;flex-direction:column;align-items:center}
  .login-card img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--surface);box-shadow:0 6px 24px rgba(99,102,241,.18);margin-bottom:1.5rem}
  .login-card .tag{display:inline-block;font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-light);padding:.3rem .9rem;border-radius:100px;margin-bottom:1.25rem}
  .login-card h1{font-family:'DM Serif Display',serif;font-size:2rem;line-height:1.15;letter-spacing:-.02em;margin-bottom:.75rem}
  .login-card p{font-size:.92rem;color:var(--text-muted);margin-bottom:2rem;font-weight:300;line-height:1.7}
  .btn-google{display:inline-flex;align-items:center;gap:.6rem;padding:.7rem 1.5rem;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;color:var(--text);cursor:pointer;transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .btn-google:hover{border-color:var(--accent);background:var(--accent-light);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.06)}
  .btn-google svg{width:20px;height:20px}
  .divider-text{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;font-size:.75rem;color:var(--text-muted);letter-spacing:.04em}
  .divider-text::before,.divider-text::after{content:'';flex:1;height:1px;background:var(--border)}
  .skip-link{font-size:.82rem;color:var(--text-muted);text-decoration:none;transition:color .2s}
  .skip-link:hover{color:var(--accent)}
  .logged-in{display:none}
  .logged-in .user-info{display:flex;align-items:center;gap:.75rem;justify-content:center;margin-bottom:1.5rem;padding:1rem;background:var(--bg);border-radius:10px}
  .logged-in .user-info img{width:40px;height:40px;border-radius:50%;margin:0}
  .logged-in .user-info span{font-size:.88rem;font-weight:500}
  .btn-primary{padding:.65rem 1.5rem;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .25s;background:var(--text);color:#fff;text-decoration:none;display:inline-block}
  .btn-primary:hover{background:#333;transform:translateY(-1px)}
  .btn-outline{padding:.55rem 1.2rem;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;transition:all .25s;background:var(--surface);color:var(--text-muted);margin-top:.75rem}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:640px){.login-card{margin:1rem;padding:2rem 1.5rem}}
</style>
</head>
<body>

<div class="login-card">
  <!-- Estado: Não logado -->
  <div class="not-logged">
    <img src="../assets/logo.png" alt="Bia Business English">
    <div class="tag">Bia Business English</div>
    <h1>Welcome Back</h1>
    <p>Log in to track your progress and submit your quiz answers.</p>
    <button class="btn-google" onclick="handleLogin()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
  </div>

</div>

<script src="../assets/auth.js"></script>
<script>
async function handleLogin() {
  try {
    await loginWithGoogle();
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      alert('Error logging in. Please try again.');
      console.error(e);
    }
  }
}

function handleLogout() {
  logout().then(() => location.reload());
}

onAuthChange(user => {
  if (user) {
    // Already logged in: redirect to home
    location.replace('../index.html');
    return;
  }
  // Not logged in: show the form
  document.querySelector('.not-logged').style.display = 'flex';
});
</script>
</body>
</html>
